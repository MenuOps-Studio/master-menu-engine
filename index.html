<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Engine</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <header class="hero">
        <img id="logo" src="" alt="Logo" style="display: none; width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px;">
        <h1 id="restaurant-name"></h1>
    </header>

    <nav class="nav-strip" id="nav-strip"></nav>

    <main id="app" class="container"></main>

    <script type="module">
        import { getRestaurantData } from './src/api.js';
        import { renderMenu, renderNav, updateActiveNav } from './src/ui.js';

        async function init() {
            const app = document.getElementById('app');
            app.innerHTML = "Loading..."; // Δείχνουμε το loading

            const { config, menu } = await getRestaurantData(1);
            
            // Καθαρίζουμε τα πάντα πριν γεμίσουμε
            app.innerHTML = ''; 
            
            // Branding
            document.getElementById('restaurant-name').innerText = config.site_name;
            const logo = document.getElementById('logo');
            if(config.logo_url) { logo.src = config.logo_url; logo.style.display = 'block'; }
            
            // Colors
            document.documentElement.style.setProperty('--primary-color', config.primary_color || '#1C1410');
            document.documentElement.style.setProperty('--accent-color', config.accent_color || '#C09A5B');

            // Render
            const categories = [...new Set(menu.map(item => item.category))];
            renderNav(document.getElementById('nav-strip'), categories);
            renderMenu(app, menu);
        }
        init();
    </script>
</body>
</html>
